# Production-style full stack: dependencies + API + Celery worker.
# Isolated under its own project name; only the API port is published.
# Memory limits keep this stack from starving co-located projects.
name: agenticrag

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    volumes:
      - agenticrag_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag"]
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 256m
    restart: unless-stopped

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 96m
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - agenticrag_qdrant:/qdrant/storage
    mem_limit: 512m
    restart: unless-stopped

  api:
    build: .
    env_file: [.env]
    ports:
      - "8090:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      qdrant: { condition: service_started }
    mem_limit: 768m
    restart: unless-stopped

  worker:
    build: .
    command: celery -A app.celery_app:celery_app worker --loglevel=info --concurrency=1
    env_file: [.env]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      qdrant: { condition: service_started }
    mem_limit: 768m
    restart: unless-stopped

volumes:
  agenticrag_pg:
  agenticrag_qdrant:
