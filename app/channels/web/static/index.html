<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agentic RAG — Chat</title>
    <style>
      :root { --bg: #0f1117; --panel: #1a1d27; --me: #2563eb; --bot: #272b38; --muted: #8b91a3; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
             background: var(--bg); color: #e7e9ee; height: 100vh; display: flex; flex-direction: column; }
      header { padding: 14px 18px; background: var(--panel); border-bottom: 1px solid #2a2e3c; }
      header h1 { font-size: 16px; margin: 0; }
      header p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
      .key-row { padding: 10px 18px; background: var(--panel); border-bottom: 1px solid #2a2e3c; display: flex; gap: 8px; }
      .key-row input { flex: 1; padding: 8px 10px; border-radius: 8px; border: 1px solid #353a4b;
                       background: #11141c; color: #e7e9ee; font-size: 13px; }
      #log { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 12px; }
      .msg { max-width: 78%; padding: 10px 13px; border-radius: 12px; line-height: 1.45; font-size: 14px; white-space: pre-wrap; }
      .msg.me { align-self: flex-end; background: var(--me); }
      .msg.bot { align-self: flex-start; background: var(--bot); }
      .meta { font-size: 11px; color: var(--muted); margin-top: 6px; }
      .badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 10px; margin-left: 6px; }
      .badge.escalated { background: #7c2d12; }
      .badge.grounded { background: #14532d; }
      .sources { margin-top: 6px; font-size: 11px; color: var(--muted); }
      form { display: flex; gap: 8px; padding: 12px 18px; background: var(--panel); border-top: 1px solid #2a2e3c; }
      form input { flex: 1; padding: 11px 13px; border-radius: 10px; border: 1px solid #353a4b;
                   background: #11141c; color: #e7e9ee; font-size: 14px; }
      form button { padding: 11px 18px; border: 0; border-radius: 10px; background: var(--me); color: #fff;
                    font-size: 14px; cursor: pointer; }
      form button:disabled { opacity: 0.5; cursor: default; }
    </style>
  </head>
  <body>
    <header>
      <h1>Agentic RAG — Chat</h1>
      <p>Answers come strictly from your tenant's uploaded documents, with sources.</p>
    </header>
    <div class="key-row">
      <input id="apiKey" type="password" placeholder="Tenant API key (X-API-Key)" autocomplete="off" />
    </div>
    <div id="log"></div>
    <form id="form">
      <input id="question" type="text" placeholder="Ask a question…" autocomplete="off" />
      <button id="send" type="submit">Send</button>
    </form>

    <script>
      const log = document.getElementById("log");
      const form = document.getElementById("form");
      const questionEl = document.getElementById("question");
      const apiKeyEl = document.getElementById("apiKey");
      const sendBtn = document.getElementById("send");
      const sessionId = crypto.randomUUID();

      function add(role, text) {
        const el = document.createElement("div");
        el.className = "msg " + role;
        el.textContent = text;
        log.appendChild(el);
        log.scrollTop = log.scrollHeight;
        return el;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const question = questionEl.value.trim();
        const apiKey = apiKeyEl.value.trim();
        if (!question) return;
        if (!apiKey) { add("bot", "Please enter your tenant API key above first."); return; }

        add("me", question);
        questionEl.value = "";
        sendBtn.disabled = true;
        const thinking = add("bot", "…");

        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-API-Key": apiKey },
            body: JSON.stringify({ question, session_id: sessionId }),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            thinking.textContent = "Error: " + (err.detail || res.status);
            return;
          }
          const data = await res.json();
          thinking.textContent = data.answer;
          const meta = document.createElement("div");
          meta.className = "meta";
          const badge = data.escalated ? '<span class="badge escalated">escalated</span>'
                      : data.grounded ? '<span class="badge grounded">grounded</span>' : "";
          const sources = (data.sources || []).map((s) => s.source).join(", ");
          meta.innerHTML = badge + (sources ? '<div class="sources">Sources: ' + sources + "</div>" : "");
          thinking.appendChild(meta);
        } catch (err) {
          thinking.textContent = "Network error. Is the server running?";
        } finally {
          sendBtn.disabled = false;
          questionEl.focus();
        }
      });
    </script>
  </body>
</html>
